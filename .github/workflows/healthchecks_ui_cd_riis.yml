name: HealthChecks UI CD Riis

on: workflow_dispatch

jobs:
  generate-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: GitHub Tag Bump
        id: tab_bump
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INITIAL_VERSION: 1.0.0
          DEFAULT_BUMP: patch

    outputs:
      new_version: ${{ steps.tab_bump.outputs.new_tag }}

  package-and-publish-lib:
    runs-on: ubuntu-latest
    needs: generate-version

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 10.0.x

      - name: Pack UI
        run: |
          dotnet pack src/HealthChecks.UI/HealthChecks.UI.csproj \
          --configuration Release \
          -p:PackageVersion=${{ needs.generate-version.outputs.new_version }} \
          -p:RepositoryUrl=https://github.com/andrlriis/AspNetCore.Diagnostics.HealthChecks \
          -o packages

      - name: Pack UI.Client
        run: |
          dotnet pack src/HealthChecks.UI.Client/HealthChecks.UI.Client.csproj \
          --configuration Release \
          -p:PackageVersion=${{ needs.generate-version.outputs.new_version }} \
          -p:RepositoryUrl=https://github.com/andrlriis/AspNetCore.Diagnostics.HealthChecks \
          -o packages

      - name: Pack UI.InMemory.Storage
        run: |
          dotnet pack src/HealthChecks.UI.InMemory.Storage/HealthChecks.UI.InMemory.Storage.csproj \
          --configuration Release \
          -p:PackageVersion=${{ needs.generate-version.outputs.new_version }} \
          -p:RepositoryUrl=https://github.com/andrlriis/AspNetCore.Diagnostics.HealthChecks \
          -o packages

      - name: Publish NuGet packages
        run: dotnet nuget push packages/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/andrlriis/index.json  